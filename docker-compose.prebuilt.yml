# docker-compose.prebuilt.yml
# ==============================================================================
# Docker Compose configuration for using PRE-BUILT images from Docker Hub
# 
# This version is designed for students/end users who want to pull and run
# the application without building it locally.
#
# Usage:
#   docker compose -f docker-compose.prebuilt.yml up -d
#
# Prerequisites:
#   1. The image must be pushed to Docker Hub first
#   2. Students need Docker installed
#   3. No Ruby or build tools required!
# ==============================================================================

services:
  # Database Service (PostgreSQL 11)
  # ============================================================================
  db:
    image: postgres:11
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: easybacklog_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Service
  # ============================================================================
  redis:
    image: redis:5-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Web Application Service (Pre-built from Docker Hub)
  # ============================================================================
  # IMPORTANT: Replace 'yourusername' with your actual Docker Hub username
  # Example: mattanmr/easybacklog:latest
  web:
    image: yourusername/easybacklog:latest  # Pull from Docker Hub
    env_file:
      - .env
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/easybacklog_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
    stdin_open: true
    tty: true

  # Background Job Worker (Pre-built from Docker Hub)
  # ============================================================================
  sidekiq:
    image: yourusername/easybacklog:latest  # Pull from Docker Hub (same image as web)
    env_file:
      - .env
    command: bundle exec sidekiq
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/easybacklog_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development

# Named Volumes for Data Persistence
volumes:
  postgres_data:
  redis_data:

# ==============================================================================
# Quick Start Commands for Students (using pre-built images):
# 
# 1. Copy environment file:
#    cp .env.example .env
#
# 2. Pull images and start services:
#    docker compose -f docker-compose.prebuilt.yml up -d
#
# 3. Initialize database (first time only):
#    docker compose -f docker-compose.prebuilt.yml exec web bundle exec rake db:schema:load
#    docker compose -f docker-compose.prebuilt.yml exec web bundle exec rake db:seed
#    docker compose -f docker-compose.prebuilt.yml exec web bundle exec rake db:seed:sample
#
# 4. Access the application:
#    http://localhost:3000
#    Login: demo@example.com / password123
#
# To stop:
#    docker compose -f docker-compose.prebuilt.yml down
# ==============================================================================
